[llm]
# Optional when GEMINI_API_KEY is exported in the environment.
api_key = "replace-with-your-gemini-api-key"
batch_poll_interval_seconds = 300
batch_submit_size = 16
retry_limit = 3

[[llm.agents]]
id = "gemini-brief"
label = "Gemini Brief"
provider = "gemini"
model = "gemini-2.5-flash"
system_prompt = "Write a concise 3-5 sentence summary for a reader."
batch_enabled = true

[[llm.agents]]
id = "gemini-deep-tech"
label = "Gemini Deep Tech"
provider = "gemini"
model = "gemini-2.5-flash"
system_prompt = "Explain technical points, risks, and practical next actions."
batch_enabled = true
